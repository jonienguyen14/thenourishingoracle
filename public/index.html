<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Meal Prep Oracle ✦</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Inter:wght@300;400;500;600&display=swap');
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#0a0a12;color:#e8e0f0;font-family:'Inter',sans-serif;min-height:100vh;overflow-x:hidden}
  ::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:#3a2a5a;border-radius:2px}

  .stars{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0;overflow:hidden}
  .star{position:absolute;border-radius:50%;animation:twinkle var(--d) ease-in-out infinite alternate}
  @keyframes twinkle{0%{opacity:.1;transform:scale(1)}100%{opacity:.9;transform:scale(1.3)}}

  .app{position:relative;z-index:1;max-width:820px;margin:0 auto;padding:24px 20px 60px}

  .header{text-align:center;padding:48px 0 32px}
  .logo{font-family:'Cormorant Garamond',serif;font-size:clamp(2rem,6vw,3.2rem);font-weight:600;letter-spacing:.04em;background:linear-gradient(135deg,#c8a8f0,#f0c8e0,#a8c8f0);-webkit-background-clip:text;-webkit-text-fill-color:transparent;line-height:1.1}
  .tagline{font-size:.8rem;letter-spacing:.2em;text-transform:uppercase;color:#8070a0;margin-top:8px}

  .card{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:16px;padding:24px;margin-bottom:20px;backdrop-filter:blur(12px)}

  .section-label{font-size:.7rem;letter-spacing:.18em;text-transform:uppercase;color:#8070a0;margin-bottom:12px;font-weight:500}

  /* Phase selector */
  .phases{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
  .phase-btn{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.1);border-radius:12px;padding:14px 8px;cursor:pointer;text-align:center;transition:all .2s;color:#e8e0f0}
  .phase-btn:hover{border-color:rgba(200,168,240,.4);background:rgba(200,168,240,.08)}
  .phase-btn.active{border-color:var(--pc);background:rgba(var(--pr),var(--pg),var(--pb),.15);box-shadow:0 0 20px rgba(var(--pr),var(--pg),var(--pb),.2)}
  .phase-emoji{font-size:1.5rem;display:block;margin-bottom:6px}
  .phase-name{font-size:.72rem;font-weight:600;letter-spacing:.06em}
  .phase-days{font-size:.62rem;color:#8070a0;margin-top:2px}

  /* Cuisine selector */
  .cuisines{display:flex;flex-wrap:wrap;gap:8px}
  .cuisine-btn{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.1);border-radius:20px;padding:7px 16px;cursor:pointer;font-size:.78rem;color:#c0b0d8;transition:all .2s;font-family:'Inter',sans-serif}
  .cuisine-btn:hover{border-color:rgba(200,168,240,.4)}
  .cuisine-btn.active{background:rgba(168,168,240,.15);border-color:rgba(168,168,240,.5);color:#d0c8f8}

  /* Form elements */
  .form-row{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px}
  .form-row.triple{grid-template-columns:1fr 1fr 1fr}
  @media(max-width:540px){.form-row,.form-row.triple{grid-template-columns:1fr}}
  .field{display:flex;flex-direction:column;gap:6px}
  label{font-size:.72rem;letter-spacing:.12em;text-transform:uppercase;color:#8070a0;font-weight:500}
  input,select,textarea{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:10px;padding:11px 14px;color:#e8e0f0;font-family:'Inter',sans-serif;font-size:.88rem;outline:none;transition:border-color .2s;-webkit-appearance:none}
  input:focus,select:focus,textarea:focus{border-color:rgba(200,168,240,.5)}
  select option{background:#1a1228;color:#e8e0f0}
  textarea{resize:none;min-height:72px}
  .toggle-row{display:flex;align-items:center;gap:10px;font-size:.82rem;color:#b0a0c8;margin-top:4px}
  .toggle{width:36px;height:20px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.15);border-radius:10px;cursor:pointer;position:relative;transition:background .2s;flex-shrink:0}
  .toggle.on{background:rgba(168,140,220,.5);border-color:rgba(168,140,220,.7)}
  .toggle::after{content:'';position:absolute;top:2px;left:2px;width:14px;height:14px;border-radius:50%;background:#fff;transition:transform .2s}
  .toggle.on::after{transform:translateX(16px)}

  /* Generate button */
  .gen-btn{width:100%;padding:16px;background:linear-gradient(135deg,rgba(140,100,220,.5),rgba(180,120,200,.4));border:1px solid rgba(200,168,240,.3);border-radius:14px;color:#e8d8f8;font-size:1rem;font-weight:500;letter-spacing:.06em;cursor:pointer;transition:all .25s;font-family:'Cormorant Garamond',serif;font-size:1.2rem}
  .gen-btn:hover:not(:disabled){background:linear-gradient(135deg,rgba(140,100,220,.7),rgba(180,120,200,.6));box-shadow:0 0 30px rgba(160,120,240,.3)}
  .gen-btn:disabled{opacity:.5;cursor:not-allowed}

  /* Tabs */
  .tabs{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:20px}
  .tab{padding:8px 14px;border-radius:20px;border:1px solid rgba(255,255,255,.1);background:transparent;color:#8070a0;cursor:pointer;font-size:.76rem;letter-spacing:.06em;transition:all .2s;font-family:'Inter',sans-serif}
  .tab:hover{border-color:rgba(200,168,240,.3);color:#b0a0c8}
  .tab.active{background:rgba(200,168,240,.15);border-color:rgba(200,168,240,.4);color:#d8c8f8}

  /* Results */
  .theme-banner{text-align:center;padding:24px;margin-bottom:20px}
  .theme-title{font-family:'Cormorant Garamond',serif;font-size:1.8rem;font-style:italic;color:#d8c8f8;margin-bottom:8px}
  .theme-sub{font-size:.82rem;color:#8070a0;line-height:1.6}

  .meal-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  @media(max-width:540px){.meal-grid{grid-template-columns:1fr}}
  .meal-card{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.07);border-radius:12px;padding:16px}
  .meal-slot{font-size:.68rem;letter-spacing:.14em;text-transform:uppercase;color:#8070a0;margin-bottom:6px}
  .meal-name{font-family:'Cormorant Garamond',serif;font-size:1.1rem;color:#e8d8f8;margin-bottom:6px}
  .meal-desc{font-size:.8rem;color:#a090b8;line-height:1.5;margin-bottom:8px}
  .meal-meta{display:flex;gap:10px;flex-wrap:wrap}
  .pill{font-size:.68rem;padding:3px 10px;border-radius:20px;background:rgba(200,168,240,.1);border:1px solid rgba(200,168,240,.2);color:#c0a8e8}

  .snack-list{display:flex;flex-direction:column;gap:10px}
  .snack-item{display:flex;justify-content:space-between;align-items:flex-start;padding:12px 16px;background:rgba(255,255,255,.04);border-radius:10px;border:1px solid rgba(255,255,255,.07)}
  .snack-name{font-size:.88rem;color:#d8c8f8;font-weight:500}
  .snack-note{font-size:.76rem;color:#8070a0;margin-top:2px}
  .snack-protein{font-size:.76rem;padding:3px 10px;border-radius:20px;background:rgba(140,200,140,.1);border:1px solid rgba(140,200,140,.25);color:#a8d8a8;white-space:nowrap;margin-left:12px}

  .ingredient-section{margin-bottom:20px}
  .ing-category{font-size:.72rem;letter-spacing:.14em;text-transform:uppercase;color:#8070a0;margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid rgba(255,255,255,.06)}
  .ing-list{display:flex;flex-direction:column;gap:8px}
  .ing-item{display:grid;grid-template-columns:1fr auto auto;gap:12px;align-items:center;padding:10px 14px;background:rgba(255,255,255,.03);border-radius:8px;border:1px solid rgba(255,255,255,.06)}
  .ing-name{font-size:.86rem;color:#d8c8f8}
  .ing-purpose{font-size:.74rem;color:#8070a0}
  .ing-amount{font-size:.8rem;color:#c0b0d8;text-align:right;white-space:nowrap}

  .step-card{display:flex;gap:16px;padding:16px;background:rgba(255,255,255,.04);border-radius:12px;border:1px solid rgba(255,255,255,.07);margin-bottom:12px}
  .step-num{width:32px;height:32px;border-radius:50%;background:rgba(200,168,240,.15);border:1px solid rgba(200,168,240,.3);display:flex;align-items:center;justify-content:center;font-size:.82rem;color:#c0a8e8;flex-shrink:0;font-weight:600}
  .step-content{flex:1}
  .step-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;flex-wrap:wrap;gap:6px}
  .step-title{font-size:.9rem;font-weight:600;color:#e8d8f8}
  .step-meta{display:flex;gap:8px}
  .step-tag{font-size:.68rem;padding:2px 8px;border-radius:12px;background:rgba(200,168,240,.1);border:1px solid rgba(200,168,240,.2);color:#c0a8e8}
  .step-instructions{font-size:.82rem;color:#a090b8;line-height:1.6}

  .remix-block{margin-bottom:20px;padding:16px;background:rgba(255,255,255,.04);border-radius:12px;border:1px solid rgba(255,255,255,.07)}
  .remix-base{font-size:.9rem;font-weight:600;color:#d8c8f8;margin-bottom:12px}
  .remix-variations{display:flex;flex-direction:column;gap:8px}
  .remix-var{padding:10px 14px;background:rgba(255,255,255,.04);border-radius:8px;border:1px solid rgba(255,255,255,.06)}
  .remix-var-name{font-size:.84rem;color:#c8b8e8;font-weight:500;margin-bottom:4px}
  .remix-how{font-size:.78rem;color:#a090b8;line-height:1.5}
  .remix-vibe{font-size:.68rem;color:#8070a0;margin-top:4px}

  .safety-cols{display:grid;grid-template-columns:1fr 1fr;gap:16px}
  @media(max-width:540px){.safety-cols{grid-template-columns:1fr}}
  .safety-col-label{font-size:.72rem;letter-spacing:.12em;text-transform:uppercase;color:#8070a0;margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid rgba(255,255,255,.06)}
  .safety-item{padding:10px 12px;background:rgba(255,255,255,.03);border-radius:8px;margin-bottom:8px;border:1px solid rgba(255,255,255,.06)}
  .safety-item-name{font-size:.84rem;color:#d8c8f8;font-weight:500;margin-bottom:3px}
  .safety-duration{font-size:.72rem;color:#a8d8a8}
  .safety-tip{font-size:.74rem;color:#8070a0;margin-top:3px}

  .schedule-list{display:flex;flex-direction:column;gap:10px}
  .sched-item{display:grid;grid-template-columns:auto 1fr;gap:14px;align-items:start;padding:12px 16px;background:rgba(255,255,255,.04);border-radius:10px;border:1px solid rgba(255,255,255,.07)}
  .sched-time-col{text-align:center;min-width:60px}
  .sched-day{font-size:.66rem;letter-spacing:.1em;text-transform:uppercase;color:#8070a0}
  .sched-time{font-size:.82rem;color:#c0a8e8;font-weight:500}
  .sched-task{font-size:.86rem;color:#d8c8f8;font-weight:500}
  .sched-note{font-size:.76rem;color:#8070a0;margin-top:3px}

  /* Email button */
  .action-row{display:flex;justify-content:flex-end;margin-top:20px}
  .email-btn{padding:10px 22px;border-radius:20px;border:1px solid rgba(200,168,240,.3);background:rgba(200,168,240,.08);color:#c8b0e8;font-size:.8rem;cursor:pointer;letter-spacing:.08em;transition:all .2s;font-family:'Inter',sans-serif}
  .email-btn:hover{background:rgba(200,168,240,.18);border-color:rgba(200,168,240,.5)}

  /* Loading */
  .loading{text-align:center;padding:60px 20px}
  .loading-orb{width:60px;height:60px;border-radius:50%;background:radial-gradient(circle,rgba(200,168,240,.6),rgba(140,100,200,.2));margin:0 auto 20px;animation:pulse 2s ease-in-out infinite}
  @keyframes pulse{0%,100%{transform:scale(1);opacity:.8}50%{transform:scale(1.15);opacity:1}}
  .loading-text{font-family:'Cormorant Garamond',serif;font-size:1.3rem;font-style:italic;color:#c0a8e8}
  .loading-sub{font-size:.78rem;color:#6050a0;margin-top:8px}

  .error-msg{background:rgba(200,80,80,.1);border:1px solid rgba(200,80,80,.25);border-radius:12px;padding:16px;color:#e8a0a0;font-size:.86rem;line-height:1.6;margin-top:16px}

  .storage-note{margin-top:16px;padding:12px 16px;background:rgba(255,255,255,.03);border-radius:10px;border:1px solid rgba(255,255,255,.06);font-size:.8rem;color:#8070a0;line-height:1.6}
</style>
</head>
<body>
<div class="stars" id="stars"></div>
<div class="app" id="root"></div>
<script type="text/babel">
const { useState, useCallback, useEffect } = React;

const PHASES = [
  { id:"menstrual",  label:"Menstrual",  emoji:"🌑", days:"Days 1–5",   pc:"#c06060", desc:"Iron-rich, warm, gentle. Rest & restore." },
  { id:"follicular", label:"Follicular", emoji:"🌱", days:"Days 6–13",  pc:"#60a070", desc:"Rising energy. Fresh, lean, light." },
  { id:"ovulatory",  label:"Ovulatory",  emoji:"🌕", days:"Days 14–16", pc:"#c09040", desc:"Peak power. Anti-inflammatory, vibrant." },
  { id:"luteal",     label:"Luteal",     emoji:"🌘", days:"Days 17–28", pc:"#8060c0", desc:"Slow down. Comforting, magnesium-rich." },
];

const SEASONS = ["🌸 Spring","☀️ Summer","🍂 Fall","❄️ Winter"];

const CUISINES = [
  { id:"mexican",    label:"🌮 Mexican" },
  { id:"japanese",   label:"🍱 Japanese" },
  { id:"korean",     label:"🥘 Korean" },
  { id:"hawaiian",   label:"🌺 Hawaiian" },
  { id:"vietnamese", label:"🍜 Vietnamese" },
  { id:"any",        label:"✨ Surprise me" },
];

const TABS = ["🍽 Meal Plan","🛒 Ingredient List","👩‍🍳 Cook Instructions","🔄 Recipe Remixes","🧊 Food Safety","📅 Schedule"];

const catLabel = { proteins:"🥩 Proteins", produce:"🥦 Produce", pantry:"🫙 Pantry", dairy:"🥛 Dairy" };

function getCurrentSeason() {
  const m = new Date().getMonth();
  if(m>=2&&m<=4) return "🌸 Spring";
  if(m>=5&&m<=7) return "☀️ Summer";
  if(m>=8&&m<=10) return "🍂 Fall";
  return "❄️ Winter";
}

// ── Stars ──────────────────────────────────────────────────────────
function initStars() {
  const c = document.getElementById("stars");
  if(!c) return;
  for(let i=0;i<80;i++){
    const s=document.createElement("div");
    s.className="star";
    const sz=Math.random()*2.5+0.5;
    s.style.cssText=`width:${sz}px;height:${sz}px;top:${Math.random()*100}%;left:${Math.random()*100}%;background:hsl(${260+Math.random()*60},60%,80%);--d:${2+Math.random()*4}s;animation-delay:${Math.random()*4}s`;
    c.appendChild(s);
  }
}

// ── Main App ───────────────────────────────────────────────────────
function App() {
  const [phase, setPhase]         = useState(PHASES[1]);

  const [favFoods, setFavFoods]   = useState("");
  const [season, setSeason]       = useState(getCurrentSeason());
  const [useSeason, setUseSeason] = useState(true);
  const [prepFor, setPrepFor]     = useState("both");
  const [budgetMin, setBudgetMin] = useState("");
  const [budgetMax, setBudgetMax] = useState("");
  const [cuisines, setCuisines]   = useState([]);
  const [result, setResult]       = useState(null);
  const [loading, setLoading]     = useState(false);
  const [error, setError]         = useState(null);
  const [activeTab, setActiveTab] = useState(0);
  const [emailSent, setEmailSent] = useState(false);

  useEffect(() => { initStars(); }, []);

  const budgetLabel = () => {
    if(budgetMin && budgetMax) return `$${budgetMin}–$${budgetMax}/week`;
    if(budgetMin) return `$${budgetMin}+/week`;
    if(budgetMax) return `up to $${budgetMax}/week`;
    return "flexible";
  };

  const toggleCuisine = (id) => {
    setCuisines(prev =>
      prev.includes(id) ? prev.filter(c=>c!==id) : [...prev, id]
    );
  };

  const generate = useCallback(async () => {
    setLoading(true); setError(null); setResult(null); setActiveTab(0); setEmailSent(false);

    const isCouple  = prepFor === "both";
    const servings  = isCouple ? "2 people (Jonie + Joe)" : prepFor==="joe" ? "1 person (Joe)" : "1 person (Jonie)";
    const totalProtein = isCouple ? 275 : prepFor==="joe" ? 155 : 120;
    const cuisineNote = cuisines.length ? `Preferred cuisine styles this week: ${cuisines.join(", ")}.` : "";

    const prompt = `You are a cycle-aware sports nutrition and meal prep coach. Generate a complete weekly meal prep plan.

PEOPLE:
- Jonie: 124 lbs, very active (PT, pole dancing, Pilates, pickleball, strength training). Cycle phase: ${phase.label} (${phase.days}). Protein target: 120g/day. ${phase.desc}
- Joe: 150 lbs, VERY active (pickleball 2–3x/week + lifting 3x/week). Protein target: 155g/day.
- Prepping for: ${servings}

PREFERENCES:
- Plant-forward but flexible. Primary proteins to rotate through: Impossible Meat, Beyond Beef burgers, tempeh, tempeh bacon, marinated tofu, edamame, lentils, chickpeas, eggs, Greek yogurt, cottage cheese.
- IMPORTANT: Include 2 x 4oz steak servings somewhere in the week plan (sous vide or pan-seared). One for Jonie, one for Joe.
- Avoid heavy meat-forward meals otherwise. Occasional eggs/dairy OK.
- Instant Pot favorites to draw from: lentil soup with beef, hearty chili, or congee. Include at least one Instant Pot batch meal.
- Favorite foods: ${favFoods || "flexible"}
- Season: ${useSeason ? season : "not specified"}
${cuisineNote}
- Total daily protein needed: ${totalProtein}g combined
- Budget: ${budgetLabel()}

BREAKFAST RULES:
- NO-COOK assembly bowls only. Everything batch-prepped in advance, scooped in the morning. Max 5 min morning effort.
- Examples: savory oats + roasted veggies + crumbled tofu, Greek yogurt + chia + mango + hemp seeds.

VEGETABLE BATCHES (stick to this exactly — not more):
- 2 sweet potatoes (roasted cubes or wedges)
- 1 head broccoli (roasted florets)
- 1 head cauliflower (roasted or riced)
No additional bulk veggie batches — keep produce minimal and purposeful.

APPLIANCES: Instant Pot, sous vide, air fryer, rice cooker

CRITICAL for ingredientList: Before finalizing, cross-check EVERY meal and snack listed. Every protein, vegetable, grain, and condiment used in meals/snacks MUST appear in the ingredientList. Do not omit any ingredient that is used.

Return ONLY valid JSON (no markdown, no backticks, no extra text):
{
  "theme": "short evocative title",
  "phaseNote": "2 sentences on phase nutrition",
  "proteinSummary": "brief protein target note",
  "meals": [
    {"slot":"Breakfast 1","name":"","description":"1 sentence","proteinPer":"Xg","highlight":""},
    {"slot":"Breakfast 2","name":"","description":"1 sentence","proteinPer":"Xg","highlight":""},
    {"slot":"Lunch 1","name":"","description":"1 sentence","proteinPer":"Xg","highlight":""},
    {"slot":"Lunch 2","name":"","description":"1 sentence","proteinPer":"Xg","highlight":""},
    {"slot":"Dinner 1","name":"","description":"1 sentence","proteinPer":"Xg","highlight":""},
    {"slot":"Dinner 2","name":"","description":"1 sentence","proteinPer":"Xg","highlight":""},
    {"slot":"Steak Night","name":"4oz Steak (×2)","description":"1 sentence on prep method","proteinPer":"~28g each","highlight":"sous vide or pan-seared"}
  ],
  "snacks": [
    {"name":"","protein":"Xg","note":"brief"},
    {"name":"","protein":"Xg","note":"brief"},
    {"name":"","protein":"Xg","note":"brief"}
  ],
  "ingredientList": {
    "proteins": [{"item":"","amount":0,"unit":"","purpose":""}],
    "produce": [{"item":"","amount":0,"unit":"","purpose":""}],
    "pantry": [{"item":"","amount":0,"unit":"","purpose":""}],
    "dairy": [{"item":"","amount":0,"unit":"","purpose":""}]
  },
  "cookInstructions": {
    "totalTime": "",
    "overview": "1-2 sentences",
    "steps": [{"step":1,"appliance":"","title":"","duration":"","instructions":"2-3 sentences"}],
    "storageNotes": ""
  },
  "remixes": [
    {"baseBatch":"","variations":[{"name":"","howTo":"1 sentence","vibe":""}]}
  ],
  "foodSafety": {
    "fridge": [{"item":"","duration":"","tip":""}],
    "freezer": [{"item":"","duration":"","tip":""}],
    "notes": ""
  },
  "schedule": {
    "prepDay": "",
    "prepTime": "",
    "reminders": [{"day":"","time":"","task":"","note":""}]
  }
}

meals: exactly the slots above. snacks: 3 only.
ingredientList: include every ingredient used across all meals/snacks, grouped by category.
cookInstructions.steps: 5–6 steps, 60–120 min total, parallel where possible.
remixes: 2 base batches, 3 variations each.
foodSafety.fridge: 4–6 items. foodSafety.freezer: 3–5 items.
schedule.reminders: 5–7 spread across the week.`;

    try {
      const res = await fetch("/api/chat", {
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body: JSON.stringify({
          model:"claude-opus-4-5",
          max_tokens:4096,
          messages:[{role:"user",content:prompt}]
        })
      });
      const data = await res.json();
      if(data.error) throw new Error(data.error.message||"API error");
      const text = data.content?.map(b=>b.text||"").join("") || "";
      const clean = text.replace(/```json|```/g,"").trim();
      const parsed = JSON.parse(clean);
      setResult(parsed);
    } catch(e) {
      setError(e.message || "Something went wrong. Try again.");
    } finally {
      setLoading(false);
    }
  }, [phase, week, favFoods, season, useSeason, prepFor, budgetMin, budgetMax, cuisines]);

  const sendEmail = async () => {
    if(!result) return;
    let body = `✦ MEAL PREP ORACLE — ${phase.label.toUpperCase()} WEEK ✦\n\nTheme: ${result.theme}\n${result.phaseNote}\nProtein: ${result.proteinSummary}\n\n`;
    body += `━━━ MEALS ━━━\n`;
    (result.meals||[]).forEach(m=>{ body+=`\n${m.slot}: ${m.name}\n${m.description}\n${m.proteinPer} · ${m.highlight}\n`; });
    body += `\n━━━ SNACKS ━━━\n`;
    (result.snacks||[]).forEach(s=>{ body+=`• ${s.name} (${s.protein}) — ${s.note}\n`; });
    body += `\n━━━ INGREDIENTS ━━━\n`;
    Object.entries(result.ingredientList||{}).forEach(([cat,items])=>{
      if(items?.length){ body+=`\n${catLabel[cat]||cat}\n`; items.forEach(i=>{ body+=`  • ${i.item} — ${i.amount} ${i.unit} (${i.purpose})\n`; }); }
    });
    body += `\n━━━ COOK SESSION ━━━\nTotal: ${result.cookInstructions?.totalTime}\n${result.cookInstructions?.overview}\n\n`;
    (result.cookInstructions?.steps||[]).forEach(s=>{ body+=`${s.step}. ${s.title} [${s.appliance}] (${s.duration})\n${s.instructions}\n\n`; });
    const subject = encodeURIComponent(`✦ Meal Prep Oracle: ${result.theme}`);
    const bodyEnc = encodeURIComponent(body);
    window.open(`mailto:?subject=${subject}&body=${bodyEnc}`);
    setEmailSent(true);
  };

  return (
    <div>
      <div className="header">
        <div className="logo">✦ Meal Prep Oracle</div>
        <div className="tagline">cycle-aware · personalized · plant-forward</div>
      </div>

      {/* Phase */}
      <div className="card">
        <div className="section-label">Cycle Phase</div>
        <div className="phases">
          {PHASES.map(p => (
            <button
              key={p.id}
              className={`phase-btn ${phase.id===p.id?"active":""}`}
              style={{"--pc":p.pc}}
              onClick={()=>setPhase(p)}
            >
              <span className="phase-emoji">{p.emoji}</span>
              <div className="phase-name">{p.label}</div>
              <div className="phase-days">{p.days}</div>
            </button>
          ))}
        </div>
      </div>

      {/* Cuisine */}
      <div className="card">
        <div className="section-label">Cuisine Vibes This Week</div>
        <div className="cuisines">
          {CUISINES.map(c => (
            <button
              key={c.id}
              className={`cuisine-btn ${cuisines.includes(c.id)?"active":""}`}
              onClick={()=>toggleCuisine(c.id)}
            >{c.label}</button>
          ))}
        </div>
      </div>

      {/* Settings */}
      <div className="card">
        <div className="form-row" style={{gridTemplateColumns:"1fr"}}>
          <div className="field">
            <label>Prepping for</label>
            <select value={prepFor} onChange={e=>setPrepFor(e.target.value)}>
              <option value="both">Jonie + Joe</option>
              <option value="jonie">Jonie only</option>
              <option value="joe">Joe only</option>
            </select>
          </div>
        </div>
        <div className="form-row triple">
          <div className="field">
            <label>Budget min</label>
            <input type="number" placeholder="$" value={budgetMin} onChange={e=>setBudgetMin(e.target.value)}/>
          </div>
          <div className="field">
            <label>Budget max</label>
            <input type="number" placeholder="$" value={budgetMax} onChange={e=>setBudgetMax(e.target.value)}/>
          </div>
          <div className="field">
            <label>Season</label>
            <select value={season} onChange={e=>setSeason(e.target.value)} disabled={!useSeason} style={{opacity:useSeason?1:.5}}>
              {SEASONS.map(s=><option key={s}>{s}</option>)}
            </select>
          </div>
        </div>
        <div className="toggle-row">
          <div className={`toggle ${useSeason?"on":""}`} onClick={()=>setUseSeason(v=>!v)}/>
          Use seasonal ingredients
        </div>
        <div style={{marginTop:16}}>
          <div className="field">
            <label>Favorite foods / notes</label>
            <textarea placeholder="e.g. miso glazed tofu, avocado, mangoes, kimchi..." value={favFoods} onChange={e=>setFavFoods(e.target.value)}/>
          </div>
        </div>
      </div>

      <button className="gen-btn" onClick={generate} disabled={loading}>
        {loading ? "✦ Conjuring your plan..." : "✦ Generate My Week"}
      </button>

      {loading && (
        <div className="loading">
          <div className="loading-orb"/>
          <div className="loading-text">Reading the stars…</div>
          <div className="loading-sub">Building your personalized plan</div>
        </div>
      )}

      {error && <div className="error-msg">⚠ {error}</div>}

      {result && (
        <div style={{marginTop:28}}>
          <div className="theme-banner">
            <div className="theme-title">{result.theme}</div>
            <div className="theme-sub">{result.phaseNote}<br/><span style={{color:"#c0a8e8",marginTop:6,display:"block"}}>{result.proteinSummary}</span></div>
          </div>

          <div className="tabs">
            {TABS.map((t,i)=>(
              <button key={i} className={`tab ${activeTab===i?"active":""}`} onClick={()=>setActiveTab(i)}>{t}</button>
            ))}
          </div>

          {/* Meal Plan */}
          {activeTab===0 && (
            <div>
              <div className="meal-grid">
                {(result.meals||[]).map((m,i)=>(
                  <div key={i} className="meal-card">
                    <div className="meal-slot">{m.slot}</div>
                    <div className="meal-name">{m.name}</div>
                    <div className="meal-desc">{m.description}</div>
                    <div className="meal-meta">
                      <span className="pill">🥩 {m.proteinPer}</span>
                      {m.highlight && <span className="pill">{m.highlight}</span>}
                    </div>
                  </div>
                ))}
              </div>
              <div style={{marginTop:20}}>
                <div className="section-label" style={{marginBottom:12}}>Snacks</div>
                <div className="snack-list">
                  {(result.snacks||[]).map((s,i)=>(
                    <div key={i} className="snack-item">
                      <div>
                        <div className="snack-name">{s.name}</div>
                        <div className="snack-note">{s.note}</div>
                      </div>
                      <span className="snack-protein">{s.protein}</span>
                    </div>
                  ))}
                </div>
              </div>
            </div>
          )}

          {/* Ingredient List */}
          {activeTab===1 && (
            <div>
              {Object.entries(result.ingredientList||{}).map(([cat,items])=>
                items?.length ? (
                  <div key={cat} className="ingredient-section">
                    <div className="ing-category">{catLabel[cat]||cat}</div>
                    <div className="ing-list">
                      {items.map((item,i)=>(
                        <div key={i} className="ing-item">
                          <div>
                            <div className="ing-name">{item.item}</div>
                            <div className="ing-purpose">{item.purpose}</div>
                          </div>
                          <div className="ing-amount">{item.amount} {item.unit}</div>
                        </div>
                      ))}
                    </div>
                  </div>
                ) : null
              )}
            </div>
          )}

          {/* Cook Instructions */}
          {activeTab===2 && (
            <div>
              <div style={{marginBottom:16,padding:"12px 16px",background:"rgba(200,168,240,.06)",borderRadius:10,border:"1px solid rgba(200,168,240,.15)"}}>
                <span style={{fontSize:".8rem",color:"#c0a8e8"}}>⏱ {result.cookInstructions?.totalTime}</span>
                <p style={{fontSize:".82rem",color:"#a090b8",marginTop:6,lineHeight:1.6}}>{result.cookInstructions?.overview}</p>
              </div>
              {(result.cookInstructions?.steps||[]).map((s,i)=>(
                <div key={i} className="step-card">
                  <div className="step-num">{s.step}</div>
                  <div className="step-content">
                    <div className="step-header">
                      <span className="step-title">{s.title}</span>
                      <div className="step-meta">
                        {s.appliance && <span className="step-tag">{s.appliance}</span>}
                        {s.duration && <span className="step-tag">{s.duration}</span>}
                      </div>
                    </div>
                    <div className="step-instructions">{s.instructions}</div>
                  </div>
                </div>
              ))}
              {result.cookInstructions?.storageNotes && (
                <div className="storage-note">📦 {result.cookInstructions.storageNotes}</div>
              )}
            </div>
          )}

          {/* Remixes */}
          {activeTab===3 && (
            <div>
              {(result.remixes||[]).map((r,i)=>(
                <div key={i} className="remix-block">
                  <div className="remix-base">🍳 Base: {r.baseBatch}</div>
                  <div className="remix-variations">
                    {(r.variations||[]).map((v,j)=>(
                      <div key={j} className="remix-var">
                        <div className="remix-var-name">{v.name}</div>
                        <div className="remix-how">{v.howTo}</div>
                        <div className="remix-vibe">{v.vibe}</div>
                      </div>
                    ))}
                  </div>
                </div>
              ))}
            </div>
          )}

          {/* Food Safety */}
          {activeTab===4 && (
            <div>
              <div className="safety-cols">
                <div>
                  <div className="safety-col-label">🧊 Fridge (3–5 days)</div>
                  {(result.foodSafety?.fridge||[]).map((item,i)=>(
                    <div key={i} className="safety-item">
                      <div className="safety-item-name">{item.item}</div>
                      <div className="safety-duration">{item.duration}</div>
                      <div className="safety-tip">{item.tip}</div>
                    </div>
                  ))}
                </div>
                <div>
                  <div className="safety-col-label">❄️ Freezer</div>
                  {(result.foodSafety?.freezer||[]).map((item,i)=>(
                    <div key={i} className="safety-item">
                      <div className="safety-item-name">{item.item}</div>
                      <div className="safety-duration">{item.duration}</div>
                      <div className="safety-tip">{item.tip}</div>
                    </div>
                  ))}
                </div>
              </div>
              {result.foodSafety?.notes && (
                <div className="storage-note" style={{marginTop:16}}>ℹ️ {result.foodSafety.notes}</div>
              )}
            </div>
          )}

          {/* Schedule */}
          {activeTab===5 && (
            <div>
              <div style={{marginBottom:16,padding:"12px 16px",background:"rgba(200,168,240,.06)",borderRadius:10,border:"1px solid rgba(200,168,240,.15)"}}>
                <span style={{fontSize:".8rem",color:"#c0a8e8"}}>📅 Prep Day: {result.schedule?.prepDay} at {result.schedule?.prepTime}</span>
              </div>
              <div className="schedule-list">
                {(result.schedule?.reminders||[]).map((r,i)=>(
                  <div key={i} className="sched-item">
                    <div className="sched-time-col">
                      <div className="sched-day">{r.day}</div>
                      <div className="sched-time">{r.time}</div>
                    </div>
                    <div>
                      <div className="sched-task">{r.task}</div>
                      {r.note && <div className="sched-note">{r.note}</div>}
                    </div>
                  </div>
                ))}
              </div>
            </div>
          )}

          <div className="action-row">
            <button className="email-btn" onClick={sendEmail}>
              {emailSent ? "resend? ✉️" : "send it? ✉️"}
            </button>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
